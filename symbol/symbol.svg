<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <!-- Black Background -->
    <rect width="400" height="400" fill="black"/>

    <!-- Dome (Burgundy to Gold Gradient) -->
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#9B1C1C;stop-opacity:1"></stop> <!-- Deep Burgundy -->
            <stop offset="100%" style="stop-color:#D4A017;stop-opacity:1"></stop> <!-- Gold -->
        </linearGradient>
    </defs>
    <path d="M100,200 Q200,100 300,200" fill="none" stroke="url(#grad1)" stroke-width="8"></path>

    <!-- Clean Layers Beneath the Dome (Terracotta and Olive Green) -->
    <line x1="100" y1="200" x2="300" y2="200" stroke="#C75B43" stroke-width="6"></line> <!-- Terracotta -->
    <line x1="120" y1="220" x2="280" y2="220" stroke="#4A5C4F" stroke-width="4"></line> <!-- Olive Green -->
    <line x1="140" y1="240" x2="260" y2="240" stroke="#C75B43" stroke-width="2"></line> <!-- Terracotta -->

    <!-- Centered Text in Muted Ivory, Clean Serif Font -->
    <text x="200" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#D1C8B1">Strata</text>
    <text x="200" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#D1C8B1">by LOROMELA</text>
</svg>
